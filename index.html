<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  /* New Purple/Blue Palette */
  --p:#a855f7; --pd:rgba(168,85,247,0.5); --pg:rgba(168,85,247,0.12);
  --accent:#6366f1;
  /* Gray Backgrounds */
  --bg:#262626; --bg2:#2d2d2d; --bg3:#333333;
  --bd:rgba(168,85,247,0.25); --bdb:rgba(168,85,247,0.4);
  --t:#f5f3ff; --td:rgba(245,243,255,0.5);
  --mono:'Share Tech Mono',monospace; --head:'Rajdhani',sans-serif;
}
#app{width:100%;display:grid;grid-template-columns:185px 1fr 175px;grid-template-rows:42px 1fr;background:var(--bg);border:1px solid var(--bd);box-shadow: 0 0 20px rgba(0,0,0,0.5);}
#hdr{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:#1a1a1a;border-bottom:2px solid var(--p);}
.logo{font-family:var(--head);font-size:17px;font-weight:700;letter-spacing:5px;color:var(--p);}
.logo small{font-size:8px;letter-spacing:3px;color:var(--td);display:block;margin-top:-3px;font-family:var(--mono);}
.hst{font-size:9px;color:var(--td);font-family:var(--mono);letter-spacing:1px;display:flex;gap:12px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;margin-right:4px;animation:p 1.5s infinite;box-shadow: 0 0 5px var(--accent);}
@keyframes p{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}

#lp{background:var(--bg2);border-right:1px solid var(--bd);padding:11px 10px;display:flex;flex-direction:column;gap:9px;}
#rp{background:var(--bg2);border-left:1px solid var(--bd);padding:11px 10px;display:flex;flex-direction:column;gap:7px;}
#ct{display:flex;align-items:center;justify-content:center;background:#1e1e1e;position:relative;}

.pl{font-size:8px;letter-spacing:3px;color:var(--p);font-family:var(--mono);text-transform:uppercase;border-bottom:1px solid var(--bd);padding-bottom:5px;margin-bottom:2px;font-weight:bold;}
.sr{display:flex;flex-direction:column;gap:2px;}
.sl{display:flex;justify-content:space-between;font-size:8px;letter-spacing:1px;color:var(--td);font-family:var(--mono);text-transform:uppercase;}
.sl span{color:var(--p);}

input[type=range]{width:100%;height:3px;-webkit-appearance:none;appearance:none;background:rgba(168,85,247,0.15);outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:var(--p);border-radius:2px;box-shadow: 0 0 5px var(--p);}

.fb{font-family:var(--mono);font-size:9px;letter-spacing:2px;padding:6px 8px;border:1px solid var(--bd);background:rgba(0,0,0,0.2);color:var(--td);cursor:pointer;transition:all 0.2s;text-transform:uppercase;text-align:left;width:100%;}
.fb:hover{background:var(--pg);border-color:var(--p);color:var(--p);padding-left:12px;}
.fb.pr{border-color:var(--accent);color:var(--accent);}
.fb.dr{border-color:rgba(244,63,94,0.3);color:rgba(244,63,94,0.6);}
.fb.dr:hover{background:rgba(244,63,94,0.08);border-color:#f43f5e;color:#f43f5e;}

.st{display:flex;justify-content:space-between;font-size:9px;color:var(--td);font-family:var(--mono);}
.st .v{color:var(--p);}
.st .v.w{color:#fbbf24;}
.st .v.b{color:#f43f5e;}

.cfg{background:#141414;border:1px solid var(--bd);padding:8px;font-size:8px;line-height:2;font-family:var(--mono);border-radius:4px;}
.cfg .ck{color:var(--td);}
.cfg .cv{color:var(--accent);}
.cfg .ce{color:rgba(168,85,247,0.3);}

.cpb{font-family:var(--mono);font-size:8px;letter-spacing:2px;padding:6px;border:1px solid var(--bd);background:transparent;color:var(--p);cursor:pointer;width:100%;text-transform:uppercase;margin-top:4px;}
.cpb:hover{background:var(--p);color:#fff;}

.cn{position:absolute;width:12px;height:12px;}
.tl{top:0;left:0;border-top:2px solid var(--p);border-left:2px solid var(--p);}
.tr{top:0;right:0;border-top:2px solid var(--p);border-right:2px solid var(--p);}
.bl{bottom:0;left:0;border-bottom:2px solid var(--p);border-left:2px solid var(--p);}
.br{bottom:0;right:0;border-bottom:2px solid var(--p);border-right:2px solid var(--p);}
#sc{font-size:9px;letter-spacing:2px;color:var(--td);font-family:var(--mono);margin-top:8px;text-align:center;}
</style>

<div id="app">
  <div id="hdr">
    <div class="logo">VOIDWALKER <small>// WEAPONS LAB — PURPLE PROTOCOL</small></div>
    <div class="hst">
      <span><span class="dot"></span>NEURAL.LINK</span>
      <span id="fps-lbl">FPS >> 60</span>
    </div>
  </div>

  <div id="lp">
    <div class="pl">// bio-status</div>
    <div class="st"><span>CAPACITY</span><span class="v" id="mag-v">FULL</span></div>
    <div class="st"><span>THERMAL</span><span class="v" id="heat-v">COOL</span></div>
    <div class="st"><span>OPTIC</span><span class="v">ADS</span></div>

    <div class="pl">// recoil tuning</div>
    <div class="sr">
      <div class="sl">VERT. LIFT <span id="v-ru">1.4</span></div>
      <input type="range" id="s-ru" min="0" max="5" step="0.1" value="1.4">
    </div>
    <div class="sr">
      <div class="sl">HORIZ. DRIFT <span id="v-rs">0.4</span></div>
      <input type="range" id="s-rs" min="0" max="3" step="0.1" value="0.4">
    </div>
    <div class="sr">
      <div class="sl">STABILIZATION <span id="v-rr">6</span></div>
      <input type="range" id="s-rr" min="0" max="20" step="0.5" value="6">
    </div>
    <div class="sr">
      <div class="sl">CONE ANGLE <span id="v-as">1.0</span></div>
      <input type="range" id="s-as" min="0" max="5" step="0.1" value="1.0">
    </div>

    <div class="pl">// action deck</div>
    <button class="fb pr" id="btn-once">▶ SINGLE</button>
    <button class="fb pr" id="btn-burst">▶▶ BURST</button>
    <button class="fb dr" id="btn-mag">⚠ FULL AUTO</button>
    <button class="fb" id="btn-clear">◻ RESET</button>
  </div>

  <div id="ct">
    <div class="cn tl"></div><div class="cn tr"></div>
    <div class="cn bl"></div><div class="cn br"></div>
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div style="display:flex;gap:18px;align-items:center;">
        <canvas id="sc2" width="255" height="255" style="border: 1px solid rgba(168,85,247,0.1);"></canvas>
        <canvas id="rc" width="140" height="230" style="border: 1px solid rgba(168,85,247,0.1);"></canvas>
      </div>
      <div id="sc">// SYSTEM READY</div>
    </div>
  </div>

  <div id="rp">
    <div class="pl">// code block</div>
    <div class="cfg" id="cfg-out"></div>
    <button class="cpb" id="copy-btn">[ COPY ]</button>
    <div class="pl" style="margin-top:6px;">// telemetry</div>
    <div class="st"><span>SHOTS</span><span class="v" id="shots-v">0</span></div>
    <div class="st"><span>LAT. DEV</span><span class="v" id="rx-v">--</span></div>
    <div class="st"><span>VER. DEV</span><span class="v" id="ry-v">--</span></div>
    <div class="pl" style="margin-top:6px;">// physics</div>
    <div style="font-size:8px;color:var(--td);font-family:var(--mono);letter-spacing:1px;" id="stance-v">IDLE</div>
  </div>
</div>

<script>
(function(){
const W=255,H=255,CX=W/2,CY=H/2,PPD=20;
let cfg={ru:1.4,rs:0.4,rr:6,as:1.0};
let bullets=[],shots=0,recoil=0,lastT=performance.now(),frames=0,fpsT=performance.now();

const sc=document.getElementById('sc2').getContext('2d');
const rc=document.getElementById('rc').getContext('2d');

function oval(){
  const base=cfg.as*PPD;
  return{rx:Math.max(base*(0.4+cfg.rs*1.4),4),ry:Math.max(base*(0.4+cfg.ru*0.7),4)};
}

function drawSpread(){
  const c=sc;
  c.clearRect(0,0,W,H);
  c.fillStyle='#222';c.fillRect(0,0,W,H);
  
  c.strokeStyle='rgba(168,85,247,0.05)';c.lineWidth=1;
  for(let x=0;x<=W;x+=25){c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.stroke();}
  for(let y=0;y<=H;y+=25){c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke();}

  const{rx,ry}=oval();
  document.getElementById('rx-v').textContent=rx.toFixed(0);
  document.getElementById('ry-v').textContent=ry.toFixed(0);
  
  c.fillStyle='rgba(168,85,247,0.08)';
  c.strokeStyle='rgba(168,85,247,0.4)';c.lineWidth=1.5;
  c.beginPath();c.ellipse(CX,CY,rx,ry,0,0,Math.PI*2);c.fill();c.stroke();

  // ADS Reticle
  c.strokeStyle='#a855f7';c.lineWidth=1.5;
  const g=10,gi=3;
  c.beginPath();
  c.moveTo(CX-g,CY);c.lineTo(CX-gi,CY);
  c.moveTo(CX+gi,CY);c.lineTo(CX+g,CY);
  c.moveTo(CX,CY-g);c.lineTo(CX,CY-gi);
  c.moveTo(CX,CY+gi);c.lineTo(CX,CY+g);
  c.stroke();
  c.fillStyle='#6366f1';
  c.beginPath();c.arc(CX,CY,1.5,0,Math.PI*2);c.fill();

  bullets.forEach(b=>{
    const a=Math.max(0,1-b.age/4);
    c.fillStyle=`rgba(168,85,247,${a})`;
    c.beginPath();c.arc(b.x,b.y,3.5,0,Math.PI*2);c.fill();
    c.shadowBlur=a*10;c.shadowColor='#a855f7';
    c.fillStyle='#fff';
    c.beginPath();c.arc(b.x,b.y,1.5,0,Math.PI*2);c.fill();
    c.shadowBlur=0;
  });
}

function drawRoblox(recoilAmt){
  const c=rc,RW=140,RH=230;
  c.clearRect(0,0,RW,RH);
  c.fillStyle='#2a2a2a';c.fillRect(0,0,RW,RH);

  const cx=RW/2;
  const lean=recoilAmt*4;

  c.save();
  c.translate(cx,45);
  c.rotate(lean*Math.PI/180*0.3);

  const FILL='#e0e0e0';
  const LINE='#111';
  const LW=2.5; // Thicker lines for that R6 look

  function rect(x,y,w,h){
    c.beginPath();
    c.rect(x,y,w,h);
    c.fillStyle=FILL;c.fill();
    c.strokeStyle=LINE;c.lineWidth=LW;c.stroke();
  }

  // HEAD (Square with slight round)
  c.beginPath();
  c.roundRect(-16,-38,32,32,4);
  c.fillStyle=FILL;c.fill();
  c.strokeStyle=LINE;c.lineWidth=LW;c.stroke();
  
  // Face
  c.fillStyle='#111';
  c.fillRect(-9,-28,5,5);
  c.fillRect(4,-28,5,5);
  c.beginPath();c.arc(0,-18,6,0.1*Math.PI,0.9*Math.PI);c.stroke();

  // TORSO (Blocky)
  rect(-20,-5,40,45);

  // ARMS
  // Left Arm
  c.save();
  c.rotate((-0.1+recoilAmt*0.1));
  rect(-40,-5,20,45);
  c.restore();

  // Right Arm (Gun Arm)
  c.save();
  c.rotate((0.1-recoilAmt*0.25));
  rect(20,-5,20,45);
  
  // Minimalist Gun
  c.fillStyle='#111';
  c.fillRect(25,25,35,10);
  c.fillRect(35,35,8,12);
  if(recoilAmt>0.5){
    c.shadowBlur=15;c.shadowColor='#a855f7';
    c.fillStyle='#fff';
    c.beginPath();c.arc(65,30,6,0,Math.PI*2);c.fill();
    c.shadowBlur=0;
  }
  c.restore();

  // LEGS
  rect(-20,40,19.5,45); // Left Leg
  rect(0.5,40,19.5,45);  // Right Leg

  c.restore();
}

function fire(){
  const{rx,ry}=oval();
  const r=Math.sqrt(Math.random()),a=Math.random()*Math.PI*2;
  bullets.push({x:CX+Math.cos(a)*rx*r,y:CY+Math.sin(a)*ry*r,age:0});
  if(bullets.length>100)bullets.shift();
  shots++;recoil=1;
  updateUI();
}

function updateUI(){
  document.getElementById('sc').textContent=`// TRANSMITTING: ${shots} DATA POINTS`;
  document.getElementById('shots-v').textContent=shots;
  const rem=Math.max(0,30-shots);
  const mv=document.getElementById('mag-v');
  mv.textContent=rem===30?'PRISTINE':rem>0?`${rem} UNITS`:'DEPLETED';
  mv.className='v'+(rem===0?' b':'');
  
  const hv=document.getElementById('heat-v');
  hv.textContent=recoil>0.7?'CRITICAL':recoil>0.3?'ACTIVE':'STABLE';
  hv.className='v'+(recoil>0.7?' b':recoil>0.3?' w':'');
}

function updateCfg(){
  document.getElementById('cfg-out').innerHTML=
    `<span class="ck">upForce</span><span class="ce"> = </span><span class="cv">${cfg.ru.toFixed(1)}</span><br>`+
    `<span class="ck">sideForce</span><span class="ce"> = </span><span class="cv">${cfg.rs.toFixed(1)}</span><br>`+
    `<span class="ck">dampening</span><span class="ce"> = </span><span class="cv">${cfg.rr}</span><br>`+
    `<span class="ck">focalSpread</span><span class="ce"> = </span><span class="cv">${cfg.as.toFixed(1)}</span>`;
}

function bind(id,key,raw){
  document.getElementById('s-'+id).addEventListener('input',e=>{
    cfg[key]=parseFloat(e.target.value);
    document.getElementById('v-'+id).textContent=raw?cfg[key]:cfg[key].toFixed(1);
    updateCfg();
  });
}
bind('ru','ru');bind('rs','rs');bind('rr','rr',true);bind('as','as');

document.getElementById('btn-once').onclick=()=>fire();
document.getElementById('btn-burst').onclick=()=>{let i=0;const t=setInterval(()=>{fire();if(++i>=4)clearInterval(t);},80);};
document.getElementById('btn-mag').onclick=()=>{let i=0;const t=setInterval(()=>{fire();if(++i>=30)clearInterval(t);},65);};
document.getElementById('btn-clear').onclick=()=>{bullets=[];shots=0;updateUI();};
document.getElementById('copy-btn').onclick=async(e)=>{
  const txt=`recoilUp = ${cfg.ru.toFixed(1)}, recoilSide = ${cfg.rs.toFixed(1)}, recovery = ${cfg.rr}, spread = ${cfg.as.toFixed(1)}`;
  try{await navigator.clipboard.writeText(txt);}catch(err){}
  e.target.textContent='[ SAVED ]';
  setTimeout(()=>{e.target.textContent='[ COPY ]';},1500);
};

let lt=performance.now();
function tick(){
  const now=performance.now(),dt=Math.min(0.05,(now-lt)/1000);lt=now;
  bullets.forEach(b=>b.age+=dt);
  bullets=bullets.filter(b=>b.age<4);
  recoil=Math.max(0,recoil-dt*(cfg.rr*0.3+1.2));
  drawSpread();drawRoblox(recoil);
  frames++;
  if(now-fpsT>1000){document.getElementById('fps-lbl').textContent=`FPS >> ${frames}`;frames=0;fpsT=now;}
  requestAnimationFrame(tick);
}
updateCfg();updateUI();tick();
})();
</script>
